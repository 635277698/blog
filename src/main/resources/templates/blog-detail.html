<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${blog.title} + ' - 博客详情'">博客详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.css" rel="stylesheet" type="text/css" />

    <!-- 引入 highlight.js 用于代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- 引入 blog.js，复用其中的函数 -->
    <script src="/js/blog.js" defer></script>

    <style>
        .prose {
            max-width: none;
            line-height: 1.6;
        }
        .prose pre {
            background-color: #1e1e1e;
            border-radius: 0.5rem;
            overflow-x: auto;
            padding: 1rem;
            margin: 1rem 0;
        }
        .prose code {
            font-size: 0.875rem;
            background-color: #f3f4f6;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
        }
        .prose pre code {
            background-color: transparent;
            padding: 0;
        }
        [data-theme="dark"] .prose code {
            background-color: #1f2937;
        }
        .prose h1 {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }
        .prose h2 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 1.25rem;
            margin-bottom: 0.75rem;
        }
        .prose h3 {
            font-size: 1.25rem;
            font-weight: bold;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }
        .prose p {
            margin-top: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .prose ul, .prose ol {
            margin-left: 1.5rem;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .prose blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
            margin: 1rem 0;
            font-style: italic;
        }
        .prose table {
            border-collapse: collapse;
            width: 100%;
            margin: 1rem 0;
        }
        .prose th, .prose td {
            border: 1px solid #e5e7eb;
            padding: 0.5rem;
        }
        [data-theme="dark"] .prose th, [data-theme="dark"] .prose td {
            border-color: #374151;
        }
    </style>

    <script>
        // 主题初始化
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);

        // 页面加载完成后高亮代码
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
        });
    </script>
</head>
<body class="min-h-screen flex flex-col bg-base-100">
<div th:replace="~{fragments/navbar :: navbar(currentPage='blog')}"></div>

<main class="flex-1 container mx-auto px-4 py-8 max-w-4xl">
    <div th:if="${blog == null}" class="alert alert-error shadow-lg">
        <span>博客不存在或已被删除</span>
        <a href="/blog" class="btn btn-sm btn-ghost">返回我的博客</a>
    </div>

    <div th:unless="${blog == null}" class="card bg-base-100 shadow-xl">
        <div class="card-body">
            <!-- 标题 -->
            <h1 class="text-3xl md:text-4xl font-bold" th:text="${blog.title}">博客标题</h1>

            <!-- 元信息 -->
            <div class="flex flex-wrap justify-between items-center gap-4 text-sm text-base-content/60 border-b border-base-200 pb-4">
                <div class="flex flex-wrap gap-4">
                    <div class="flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <span th:text="${blog.authorName}">作者</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <span th:text="${blog.createTime}">时间</span>
                    </div>
                </div>

                <!-- 操作按钮（仅作者可见）- 复用 blog.js 中的 deleteBlog 函数 -->
                <div class="flex gap-2" th:if="${session.user != null and session.user.id == blog.authorId}">
                    <a th:href="@{/blog/edit/{id}(id=${blog.id})}" class="btn btn-outline btn-sm gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                        </svg>
                        编辑
                    </a>
                    <button class="btn btn-outline btn-sm text-error gap-1" th:onclick="'deleteBlog(' + ${blog.id} + ')'">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        删除
                    </button>
                </div>
            </div>

            <!-- 博客内容 - 服务端渲染的 HTML（使用 utext 输出） -->
            <div class="prose prose-lg dark:prose-invert max-w-none mt-6"
                 th:utext="${blogContent}">
                <p class="text-gray-500">加载中...</p>
            </div>

            <!-- 返回按钮 -->
            <div class="flex justify-center mt-8 pt-4 border-t border-base-200">
                <a href="/blog" class="btn btn-ghost gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    返回我的博客
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="/js/theme.js"></script>
</body>
</html>
