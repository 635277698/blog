<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账户设置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.css" rel="stylesheet" type="text/css" />
    <script>
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
    </script>
</head>
<body class="min-h-screen flex flex-col">
<div th:replace="~{fragments/navbar :: navbar(currentPage='settings')}"></div>

<main class="flex-1 container mx-auto p-4">
    <div th:if="${session.user == null}" class="alert alert-warning">
        请先 <a href="/login" class="link">登录</a>
    </div>

    <div th:unless="${session.user == null}" class="card bg-base-100 shadow-sm">
        <div class="card-body">
            <h2 class="text-2xl font-bold mb-4">账户设置</h2>

            <form method="post" action="/api/user/update">
                <div class="form-control mb-4">
                    <label class="label">用户名</label>
                    <input type="text" name="username" class="input input-bordered" th:value="${session.user.username}" />
                </div>

                <div class="form-control mb-4">
                    <label class="label">邮箱</label>
                    <input type="email" name="email" class="input input-bordered" th:value="${session.user.email}" />
                </div>

                <div class="form-control mb-6">
                    <label class="label">个人简介</label>
                    <textarea name="bio" class="textarea textarea-bordered" rows="3">${session.user.bio}</textarea>
                </div>

                <button type="submit" class="btn btn-primary w-full">保存修改</button>
            </form>

            <div class="divider"></div>

            <a href="/logout" class="btn btn-error">退出登录</a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
