<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客广场</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.css" rel="stylesheet" type="text/css" />
</head>
<body class="min-h-screen flex flex-col">
<div th:replace="~{fragments/navbar :: navbar(currentPage='square')}"></div>

<main class="flex-1 container mx-auto p-4">
    <h2 class="text-2xl font-bold mb-4">博客广场</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div th:each="blog : ${squareBlogs}" class="card bg-base-100 shadow-sm">
            <div class="card-body">
                <h3 class="card-title" th:text="${blog.title}">标题</h3>
                <p th:text="${blog.summary}">摘要</p>
                <div class="card-actions justify-between">
                    <span class="text-sm" th:text="'作者：' + ${blog.authorName}">作者</span>
<!--                    <span class="text-sm" th:text="'❤️ ' + ${blog.likes}">点赞</span>-->
                </div>
            </div>
        </div>
        <div th:if="${squareBlogs == null or squareBlogs.isEmpty()}" class="col-span-2 text-center text-gray-500 py-8">
            暂无博客
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="/js/theme.js"></script>
</body>
</html>
