<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.css" rel="stylesheet" type="text/css" />
    <script>
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
    </script>
</head>
<body class="min-h-screen flex flex-col">
<div th:replace="~{fragments/navbar :: navbar(currentPage='profile')}"></div>

<main class="flex-1 container mx-auto p-4">
    <div th:if="${session.user == null}" class="alert alert-warning">
        请先 <a href="/login" class="link">登录</a>
    </div>

    <div th:unless="${session.user == null}" class="card bg-base-100 shadow-sm">
        <div class="card-body">
            <div class="flex items-center gap-4">
                <div class="avatar">
                    <div class="w-16 rounded-full">
                        <img th:src="${session.user.avatar ?: 'https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp'}" />
                    </div>
                </div>
                <div>
                    <h2 class="text-2xl font-bold" th:text="${session.user.username}">用户名</h2>
                    <p class="text-gray-500" th:text="${session.user.email}">邮箱</p>
                </div>
            </div>

            <div class="divider"></div>

            <div class="stats shadow">
                <div class="stat">
                    <div class="stat-title">文章</div>
                    <div class="stat-value" th:text="${userStats.blogCount ?: 0}">0</div>
                </div>
                <div class="stat">
                    <div class="stat-title">粉丝</div>
                    <div class="stat-value" th:text="${userStats.followerCount ?: 0}">0</div>
                </div>
                <div class="stat">
                    <div class="stat-title">获赞</div>
                    <div class="stat-value" th:text="${userStats.likeCount ?: 0}">0</div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
